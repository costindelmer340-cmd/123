server:
  port: 8080

spring:
  application:
    name: mall-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ecommerce_after_sale?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: info

app:
  auth:
    jwt-secret: change-me-change-me-change-me-change-me
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
  ai:
    base-url: http://localhost:8085

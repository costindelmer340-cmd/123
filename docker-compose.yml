services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-after-sale-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ecommerce_after_sale
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: ecommerce-after-sale-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: ecommerce-after-sale-ai
    restart: unless-stopped
    ports:
      - "${AI_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ecommerce-after-sale-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ecommerce_after_sale?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_AI_BASE_URL: http://ai-service:9000
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  merchant-web:
    build:
      context: .
      dockerfile: frontend/merchant-web/Dockerfile
    container_name: ecommerce-after-sale-merchant-web
    restart: unless-stopped
    ports:
      - "${MERCHANT_WEB_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_started

  admin-web:
    build:
      context: .
      dockerfile: frontend/admin-web/Dockerfile
    container_name: ecommerce-after-sale-admin-web
    restart: unless-stopped
    ports:
      - "${ADMIN_WEB_PORT:-5175}:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  mysql-data:
  redis-data:
